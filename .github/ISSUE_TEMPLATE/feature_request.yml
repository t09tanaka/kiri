name: Feature request
description: Suggest a new feature, command, or behaviour for kiri.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        kiri stays small on purpose. Features that meaningfully help the
        agent-in-the-terminal loop are in scope; general IDE features are
        usually not. See the README for the project's scope statement.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: |
        What workflow does not work today, or works badly? Describe the
        situation a user is in when they hit this — not the solution yet.
      placeholder: "When I want to ..., I have to ..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How should kiri behave? Sketch the user-facing surface (UI, CLI
        verb, keyboard shortcut). Do not start with implementation detail.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the same problem, and why this one wins.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Mockups, links to similar features in other tools, etc.
    validations:
      required: false
