name: Bug report
description: Something in kiri is broken or does not behave as documented.
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the bug report. Please fill in the sections below so we
        can reproduce the issue quickly. Vague reports often sit untouched
        because nobody can act on them.

  - type: input
    id: version
    attributes:
      label: kiri version
      description: From the app's About panel, or the output of `kiri --version`.
      placeholder: 'v0.5.1'
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and architecture
      placeholder: 'macOS 15.2 (Apple Silicon)'
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, and what did kiri do that surprised you?
      placeholder: 'I split a pane with `kiri term split --dir v` and ...'
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Numbered steps a maintainer can paste into their own kiri.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: |
        Paste any relevant output (terminal text in code fences, screenshots
        for UI). Trim long logs — first/last 50 lines is usually enough.
    validations:
      required: false
